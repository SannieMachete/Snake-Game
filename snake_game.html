<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <link rel="stylesheet" href="snakegame.css">
</head>
<body>
<div id="game-wrap">
  <div id="score-bar">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-val" id="score">0</div></div>
    <div class="stat"><div class="stat-label">High Score</div><div class="stat-val" id="hi">0</div></div>
    <div class="stat"><div class="stat-label">Level</div><div class="stat-val" id="level">1</div></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="canvas" width="360" height="360"></canvas>
    <div id="overlay">
      <div id="msg-box">
        <div id="msg-title">Snake</div>
        <div id="msg-sub">Use arrow keys or d-pad to play</div>
        <button onclick="startGame()">Start game</button>
      </div>
    </div>
  </div>

  <div id="dpad">
    <div class="dp empty"></div>
    <div class="dp" onclick="turn(0,-1)">▲</div>
    <div class="dp empty"></div>
    <div class="dp" onclick="turn(-1,0)">◀</div>
    <div class="dp empty"></div>
    <div class="dp" onclick="turn(1,0)">▶</div>
    <div class="dp empty"></div>
    <div class="dp" onclick="turn(0,1)">▼</div>
    <div class="dp empty"></div>
  </div>
</div>

<script src="snakegame.js"></script>
</body>
</html>
